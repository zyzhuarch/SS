<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簡約換匯小工具</title>
  
  <!-- 載入大大指定的字體 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1+Code:wght@282&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* 設定指定色彩變數 */
      --bg-color: #E1DBC9;
      --amount-card-bg: #2D4530;
      --rate-card-bg: #3C3C3C;
      --text-color: #E1DBC9;
      --result-text: #2D4530;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      /* 套用指定字體 */
      font-family: "M PLUS 1 Code", monospace;
      font-optical-sizing: auto;
      font-weight: 282;
      font-style: normal;
      
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .exchange-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      border-radius: 20px;
      padding: 32px 24px;
      color: var(--text-color);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease;
    }

    .card:focus-within {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
    }

    .amount-card {
      background-color: var(--amount-card-bg);
    }

    .rate-card {
      background-color: var(--rate-card-bg);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 14px;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    input {
      background: transparent;
      border: none;
      border-bottom: 2px solid rgba(225, 219, 201, 0.3);
      color: var(--text-color);
      font-family: inherit;
      font-size: 36px;
      padding: 8px 0;
      outline: none;
      transition: border-color 0.3s ease;
    }

    input:focus {
      border-bottom-color: var(--text-color);
    }

    input::placeholder {
      color: rgba(225, 219, 201, 0.3);
    }

    /* 隱藏數字輸入框自帶的上下箭頭 */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    /* 塔塔自由發揮的結果顯示區塊 */
    .result-section {
      text-align: center;
      padding: 24px 0;
      color: var(--result-text);
    }

    .result-label {
      font-size: 16px;
      margin-bottom: 8px;
      font-weight: bold;
      opacity: 0.8;
    }

    .result-value {
      font-size: 48px;
      font-weight: bold;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="exchange-container">
    <!-- 上方：輸入換匯金額 -->
    <div class="card amount-card">
      <div class="input-group">
        <label for="amount">欲換匯金額 (台幣)</label>
        <input type="number" id="amount" placeholder="0" min="0">
      </div>
    </div>

    <!-- 下方：輸入匯率 -->
    <div class="card rate-card">
      <div class="input-group">
        <label for="rate">當前匯率 (預設日幣)</label>
        <input type="number" id="rate" value="0.1998" step="0.0001" min="0">
      </div>
    </div>

    <!-- 計算結果 -->
    <div class="result-section">
      <div class="result-label">可換得外幣</div>
      <div class="result-value" id="result">0</div>
    </div>
  </div>

  <script>
    // 綁定輸入框與結果顯示元素
    const amountInput = document.getElementById('amount');
    const rateInput = document.getElementById('rate');
    const resultDisplay = document.getElementById('result');

    // 即時計算函數
    function calculateExchange() {
      const amount = parseFloat(amountInput.value) || 0;
      const rate = parseFloat(rateInput.value) || 0;

      if (amount > 0 && rate > 0) {
        // 台幣除以匯率等於可換得的外幣
        const converted = amount / rate;
        
        // 格式化數字，加上千分位撇號並限制小數點後兩位
        resultDisplay.textContent = new Intl.NumberFormat('zh-TW', { 
          maximumFractionDigits: 2 
        }).format(converted);
      } else {
        resultDisplay.textContent = '0';
      }
    }

    // 監聽輸入事件，達成即時試算效果
    amountInput.addEventListener('input', calculateExchange);
    rateInput.addEventListener('input', calculateExchange);
  </script>

</body>
</html>
